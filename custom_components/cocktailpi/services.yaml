# Names and descriptions live in strings.json / translations/*.json
# (the "services" section); this file only declares fields and targets.
order_cocktail:
  fields:
    recipe_id:
      example: 3
      selector:
        number:
          min: 1
          mode: box
    recipe_name:
      example: Mojito
      selector:
        text:
    amount_ml:
      example: 350
      selector:
        number:
          min: 10
          max: 5000
          unit_of_measurement: mL
          mode: box
    is_ingredient:
      default: false
      selector:
        boolean:
    config_entry_id:
      selector:
        config_entry:
          integration: cocktailpi

cancel_cocktail:
  fields:
    config_entry_id:
      selector:
        config_entry:
          integration: cocktailpi

pump_up:
  target:
    entity:
      integration: cocktailpi
      domain: valve

pump_back:
  target:
    entity:
      integration: cocktailpi
      domain: valve
