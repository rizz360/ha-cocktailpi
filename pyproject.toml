[tool.ruff]
target-version = "py313"
line-length = 100
src = ["custom_components/cocktailpi"]

[tool.ruff.lint]
select = [
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "I",   # isort
    "RUF", # ruff-specific
    "SIM", # flake8-simplify
    "UP",  # pyupgrade
    "W",   # pycodestyle warnings
]
ignore = [
    "RUF012", # HA's _attr_* class attributes are conventionally not ClassVar-annotated
]

[tool.ruff.lint.isort]
known-first-party = ["custom_components.cocktailpi"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
